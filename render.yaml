services:
  - type: web
    name: style-savant
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /savant
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: AGNES_AI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
