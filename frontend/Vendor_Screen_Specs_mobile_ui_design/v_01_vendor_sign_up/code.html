<body class="bg-[#2F9C95] min-h-screen font-body-md text-on-surface antialiased flex flex-col items-center justify-center p-margin-page">
<!-- Header Section -->
<div class="flex flex-col items-center mb-8 w-full max-w-md">
<div class="w-20 h-20 mb-4 rounded-full overflow-hidden flex items-center justify-center bg-white/10 backdrop-blur-sm border border-white/20 shadow-lg">
<img class="w-full h-full object-cover" data-alt="A stylized, vibrant logo mark for a fashion platform named 'Style Savant', featuring abstract geometric shapes in bold coral red and crisp white against a clean background, conveying a high-end, modern creative aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBVcoNYnnT-MGnFVu6aZVTMmxxlCBQ_BzQBHyAYfmZJJBrHuAy6b00BDC3iAIR6I_g2ic5Mon5ZpQ3IiisS2o_pFtQFTiAtdXzFMYbSYH_Z6y5mjzus4JR5JfZZNk7sKIn8e-sokflnpenQ8bsrYJKdsHrNPo43yXxBzt3vpLCi8isth1VL7AvgjzRRCqAhbZV_1Y-M5y1G3JtorpTW26FJJvOjApa_dYDEgt5UkxHe8OJahmu69SZqCy_yOFvCHV5rrq7GGYmmN1Ys"/>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-primary mb-2 text-center tracking-tight">Style Savant</h1>
<h2 class="font-headline-md text-headline-md text-on-primary mb-1 text-center">Sell on Style Savant</h2>
<p class="font-body-md text-body-md text-on-primary/80 text-center">Set up your vendor account</p>
</div>
<!-- Form Card -->
<div class="bg-surface-white rounded-xl shadow-2xl w-full max-w-md p-6 sm:p-8 border border-outline-variant/30">
<form class="space-y-5">
<!-- Business Name -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface-variant mb-1.5" for="businessName">Business Name</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="storefront">storefront</span>
</span>
<input class="w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="businessName" placeholder="Your brand name" type="text"/>
</div>
</div>
<!-- Full Name -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface-variant mb-1.5" for="fullName">Full Name</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="person">person</span>
</span>
<input class="w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface-variant mb-1.5" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="mail">mail</span>
</span>
<input class="w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="email" placeholder="jane@example.com" type="email"/>
</div>
</div>
<!-- Phone -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface-variant mb-1.5" for="phone">Phone Number</label>
<div class="flex">
<span class="inline-flex items-center px-3 rounded-l-lg border border-r-0 border-outline-variant bg-surface-container-low text-on-surface-variant font-body-md text-body-md">
                        +233
                    </span>
<input class="w-full px-3 py-2.5 bg-surface border border-outline-variant rounded-r-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="phone" placeholder="54 123 4567" type="tel"/>
</div>
</div>
<!-- Category -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface-variant mb-1.5" for="category">Business Category</label>
<div class="relative">
<select class="w-full pl-3 pr-10 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="category">
<option disabled="" selected="" value="">Select category</option>
<option value="fashion">Fashion</option>
<option value="art">Art</option>
<option value="both">Both</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Password -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface-variant mb-1.5" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock">lock</span>
</span>
<input class="w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-title-sm text-title-sm text-on-surface-variant mb-1.5" for="confirmPassword">Confirm</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]" data-icon="lock_reset">lock_reset</span>
</span>
<input class="w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-colors" id="confirmPassword" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- CTA -->
<div class="pt-4">
<button class="w-full h-[48px] bg-secondary-container hover:bg-secondary text-on-primary font-title-sm text-title-sm rounded-xl transition-colors duration-200 shadow-sm flex items-center justify-center" type="button">
                    Create Vendor Account
                </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-6 text-center">
<a class="font-title-sm text-title-sm text-primary hover:text-primary-fixed-variant transition-colors" href="#">
                Already have an account? Log In
            </a>
</div>
</div>
